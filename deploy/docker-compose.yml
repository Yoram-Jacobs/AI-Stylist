name: dressapp

# docker-compose.yml — DressApp production stack on a single VPS.
#
# Spins up three containers:
#   - backend   : FastAPI + local ML inference (port 8001 internal)
#   - frontend  : nginx-served CRA bundle (port 3000 internal)
#   - caddy     : TLS-terminating reverse proxy (80/443 public)
#
# Data durability:
#   - MongoDB lives in Atlas (external) — no volume needed
#   - Model weights are cached in `model-cache` + `rembg-cache` volumes
#     so restarts don't re-download the ~180 MB SegFormer + u2netp models
#   - Caddy certs + config persist in `caddy-data` / `caddy-config`
#
# Bring up:
#   docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
# Tail logs:
#   docker compose -f deploy/docker-compose.yml logs -f

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    image: dressapp-backend:latest
    container_name: dressapp-backend
    restart: unless-stopped
    env_file: ./.env
    environment:
      # Make sure the backend trusts the Caddy forwarded headers.
      FORWARDED_ALLOW_IPS: "*"
    expose:
      - "8001"
    # Heavy ML inference — give it a generous memory ceiling but let it
    # steadily-state around 1 GiB. Tune if your VPS is tighter.
    deploy:
      resources:
        limits:
          memory: 3g
    volumes:
      - model-cache:/models/huggingface
      - rembg-cache:/models/u2net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/api/v1/listings?status=active"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    networks: [dress]

  # ---------------------------------------------------------------
  # DressApp Eyes (Phase O.3) — self-hosted Gemma-4 E2B inference.
  # Internal-only; reached by the backend at http://eyes:7860 over
  # the dress network. Caddy never proxies it. Lifts the Qwen-VL
  # leg of garment_vision.py when EYES_PROVIDER=gemma in .env.
  #
  # First boot pulls a 3.4 GB GGUF from HuggingFace (private repo,
  # auth via EYES_HF_TOKEN). Cached afterwards in eyes-cache, so
  # subsequent restarts take ~30 s for model load only.
  # ---------------------------------------------------------------
  eyes:
    build:
      context: ../inference-server/eyes
      dockerfile: Dockerfile
    image: dressapp-eyes:latest
    container_name: dressapp-eyes
    restart: unless-stopped
    environment:
      EYES_HF_TOKEN: ${EYES_HF_TOKEN:-}
      EYES_API_TOKEN: ${EYES_API_TOKEN:-}
      # Optional: set in .env once you push the vision projector to
      # enable the LLaVA chat handler. Until then, Phase 1 is text-only.
      EYES_MMPROJ_FILE: ${EYES_MMPROJ_FILE:-}
      LLAMA_THREADS: ${EYES_LLAMA_THREADS:-2}
      LLAMA_CTX_SIZE: ${EYES_LLAMA_CTX_SIZE:-4096}
      LLAMA_N_BATCH: ${EYES_LLAMA_N_BATCH:-256}
    expose:
      - "7860"
    # Memory ceiling: Q4_K_M of a ~5B Gemma model resides at ~4 GB.
    # CX22 users (4 GB total) MUST add swap before bringing this up
    # (see inference-server/eyes/README.md). CX32 users have 2 GB
    # headroom and don't need swap. We don't set a hard limit here
    # because OOM-killing under transient pressure would be worse
    # than letting the kernel page out cold weights from the mmap.
    volumes:
      - eyes-cache:/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7860/healthz"]
      interval: 30s
      timeout: 5s
      # First boot needs ~5–10 min to download the GGUF; after that,
      # ~30 s to load the cached file. Set start_period to cover the
      # cold-start case so Docker doesn't keep restarting the container.
      start_period: 600s
      retries: 3
    networks: [dress]

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        # Baked into the bundle at build time — MUST match the public URL
        # (same origin since Caddy proxies /api/* back to the backend).
        REACT_APP_BACKEND_URL: https://${DOMAIN}
    image: dressapp-frontend:latest
    container_name: dressapp-frontend
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks: [dress]

  caddy:
    image: caddy:2-alpine
    container_name: dressapp-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks: [dress]

volumes:
  model-cache:
  rembg-cache:
  eyes-cache:
  caddy-data:
  caddy-config:
  caddy-logs:

networks:
  dress:
    driver: bridge
