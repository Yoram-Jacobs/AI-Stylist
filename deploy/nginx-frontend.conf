# Minimal nginx config for serving the CRA SPA bundle on port 3000.
#
# Caddy terminates TLS upstream and proxies here; we just need to serve
# static files with a history-fallback so React Router works on deep
# links (e.g. /closet/abc123).
server {
    listen 3000;
    listen [::]:3000;

    root /usr/share/nginx/html;
    index index.html;

    # Brotli/gzip handled by Caddy upstream — keep nginx plain.
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Long cache for hashed CRA assets (hash in filename invalidates).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|jpg|jpeg|png|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache index.html so deploys roll out instantly.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — unknown routes serve index.html so React Router takes over.
    location / {
        try_files $uri /index.html;
    }
}
